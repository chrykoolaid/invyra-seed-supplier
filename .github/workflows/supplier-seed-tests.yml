name: Supplier Seed Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Compile package
        run: python -m compileall -q supplier_seed

      - name: Run pytest suite
        id: pytest
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -vv --tb=short 2>&1 | tee test-results-${{ matrix.python-version }}.txt

      - name: Publish test diagnostics to job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Supplier Seed pytest output — Python ${{ matrix.python-version }}'
            echo
            echo '```text'
            cat test-results-${{ matrix.python-version }}.txt 2>/dev/null || echo 'No test output file was created.'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supplier-seed-test-results-python-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.txt
          if-no-files-found: warn

      - name: Publish failing diagnostics issue
        if: failure() && matrix.python-version == '3.11'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE='CI: Supplier Seed pytest failures'
          OUTPUT_FILE='test-results-3.11.txt'
          BODY_FILE='ci-failure-body.md'
          {
            echo '## Supplier Seed pytest failure'
            echo
            echo "Commit: $GITHUB_SHA"
            echo "Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo '```text'
            tail -c 55000 "$OUTPUT_FILE" 2>/dev/null || echo 'No pytest output file was created.'
            echo
            echo '```'
          } > "$BODY_FILE"

          ISSUE_NUMBER=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue comment "$ISSUE_NUMBER" --body-file "$BODY_FILE"
          else
            gh issue create --title "$TITLE" --body-file "$BODY_FILE"
          fi

  release-certification:
    name: Phase T release certification
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install release tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Verify typed package marker
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path('dist').glob('*.whl'))
          with ZipFile(wheel) as archive:
              names = set(archive.namelist())
          marker = 'supplier_seed/py.typed'
          if marker not in names:
              raise SystemExit(f'missing {marker} from {wheel.name}')
          print(f'verified {marker} in {wheel.name}')
          PY

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Smoke import public SDK
        run: |
          python - <<'PY'
          from supplier_seed.sdk import (
              AuditEventResource,
              QueueResource,
              SupplierDetailResource,
              SupplierSeedApiError,
              SupplierSeedAsyncReadClient,
              SupplierSeedAsyncTypedReadClient,
              SupplierSeedReadClient,
              SupplierSeedTypedReadClient,
              SupplierSummaryResource,
          )

          exports = (
              AuditEventResource,
              QueueResource,
              SupplierDetailResource,
              SupplierSeedApiError,
              SupplierSeedAsyncReadClient,
              SupplierSeedAsyncTypedReadClient,
              SupplierSeedReadClient,
              SupplierSeedTypedReadClient,
              SupplierSummaryResource,
          )
          assert all(export is not None for export in exports)
          print('Phase T public SDK certification passed')
          PY

      - name: Upload certified distributions
        uses: actions/upload-artifact@v4
        with:
          name: phase-t-certified-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 14
