name: Supplier Seed Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Compile package
        run: python -m compileall -q supplier_seed

      - name: Run pytest suite
        id: pytest
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -vv --tb=short 2>&1 | tee test-results-${{ matrix.python-version }}.txt

      - name: Publish test diagnostics to job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Supplier Seed pytest output — Python ${{ matrix.python-version }}'
            echo
            echo '```text'
            cat test-results-${{ matrix.python-version }}.txt 2>/dev/null || echo 'No test output file was created.'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supplier-seed-test-results-python-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.txt
          if-no-files-found: warn
